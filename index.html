<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:type" content="website">
    <meta property="og:title" content="원클릭 스밍 주소 생성기 v2">
    <meta property="og:description" content="웹 주소를 입력하면 앱 실행 링크로 빠르게 변환합니다.">
    <meta property="og:image" content="./thum.jpg">
    <meta property="og:image:alt" content="원클릭 스밍 주소 생성기 썸네일">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="원클릭 스밍 주소 생성기 v2">
    <meta name="twitter:description" content="웹 주소를 입력하면 앱 실행 링크로 빠르게 변환합니다.">
    <meta name="twitter:image" content="./thum.jpg">
    <title>원클릭 스밍 주소 생성기 v2</title>
    <link rel="stylesheet" href="./css/styles2.css">
</head>
<body>
    <div class="ambient" aria-hidden="true"></div>

    <main class="container">
        <header class="hero">
            <span class="badge">Oneply v2</span>
            <h1>스밍 주소 생성기</h1>
            <p>웹 주소를 입력하면 앱 실행 링크로 빠르게 변환합니다.</p>
        </header>

        <section class="panel">
            <fieldset class="form-group platform-fieldset">
                <legend>플랫폼 선택</legend>
                <div class="radio-group" role="radiogroup" aria-label="플랫폼 선택">
                    <div class="radio-option">
                        <input type="radio" id="melon2" name="platform" value="melon" checked>
                        <label for="melon2"><img src="melon.png" alt="멜론" class="app-icon" onerror="this.style.display='none'"> 멜론</label>
                    </div>

                    <div class="radio-option">
                        <input type="radio" id="genie2" name="platform" value="genie">
                        <label for="genie2"><img src="genie.png" alt="지니" class="app-icon" onerror="this.style.display='none'"> 지니</label>
                    </div>

                    <div class="radio-option">
                        <input type="radio" id="flo2" name="platform" value="flo">
                        <label for="flo2"><img src="flo.png" alt="플로" class="app-icon" onerror="this.style.display='none'"> 플로</label>
                    </div>
                </div>
            </fieldset>

            <div class="quick-links" aria-label="보조 메뉴">
                <a class="quick-link-btn" href="https://example.com/blog-guide" target="_blank" rel="noopener noreferrer">사용설명서</a>
                <a class="quick-link-btn" href="./examples/">예시</a>
                <a class="quick-link-btn" href="./contact/">문의</a>
            </div>

            <div class="form-group" id="inputWrapper"></div>

            <button type="button" id="addInputBtn" class="btn-secondary">+ 멜론 입력 칸 추가</button>
            <button type="button" id="generateBtn" class="btn-primary">스밍 주소 생성</button>

            <div class="output-group" id="outputWrapper" aria-live="polite"></div>
        </section>
    </main>

    <script src="./js/app2.js" defer></script>
</body>
</html>
