<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>원클릭 스밍 주소 생성기</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: linear-gradient(180deg, #f7f9fc 0%, #eef3f8 100%);
            color: #333;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.96);
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        p {
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 15px;
        }

        legend {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .platform-fieldset {
            border: 0;
            padding: 0;
            min-width: 0;
        }

        .radio-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1 1 140px;
            min-width: 0;
            padding: 10px 12px;
            border: 1px solid #dde3ea;
            border-radius: 12px;
            background: #fff;
        }

        .radio-option:focus-within {
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.14);
        }

        .radio-option input {
            margin: 0;
            accent-color: #007bff;
        }

        .radio-option label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            margin-bottom: 0;
            font-weight: 600;
        }

        .app-icon {
            width: 20px;
            height: 20px;
            margin-right: 6px;
            border-radius: 4px;
            object-fit: cover;
        }

        .input-block {
            position: relative;
            margin-bottom: 15px;
            padding: 15px;
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
        }

        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .input-header span {
            font-weight: bold;
            font-size: 14px;
            color: #495057;
        }

        .delete-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .delete-btn:hover {
            background-color: #c82333;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.5;
        }

        textarea[readonly] {
            background-color: #f8f9fa;
            height: 80px;
        }

        textarea:focus-visible,
        button:focus-visible,
        input[type="radio"]:focus-visible {
            outline: 3px solid rgba(0, 123, 255, 0.25);
            outline-offset: 2px;
        }

        .btn-primary {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #0056b3;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            margin-bottom: 10px;
        }

        .btn-secondary:hover {
            background-color: #5a6268;
        }

        .output-group {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .output-block {
            margin-bottom: 20px;
        }

        .btn-copy {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            margin-top: 8px;
        }

        .btn-copy:hover {
            background-color: #218838;
        }

        .warning-text {
            color: #dc3545;
            font-size: 12px;
            font-weight: normal;
            margin-left: 8px;
            word-break: keep-all;
        }

        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
        }

        @media (max-width: 640px) {
            body {
                padding: 16px 12px;
            }

            .container {
                padding: 20px;
                border-radius: 14px;
            }

            .radio-option {
                flex-basis: 100%;
            }

            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>스밍 주소 생성기</h1>
        <p>음원 플랫폼의 웹 주소를 앱 전용 실행 링크로 변환합니다.</p>

        <fieldset class="form-group platform-fieldset">
            <legend>플랫폼 선택</legend>
            <div class="radio-group" role="radiogroup" aria-label="플랫폼 선택">
                <div class="radio-option">
                    <input type="radio" id="melon" name="platform" value="melon" checked>
                    <label for="melon"><img src="melon.png" alt="멜론" class="app-icon" onerror="this.style.display='none'"> 멜론</label>
                </div>

                <div class="radio-option">
                    <input type="radio" id="genie" name="platform" value="genie">
                    <label for="genie"><img src="genie.png" alt="지니" class="app-icon" onerror="this.style.display='none'"> 지니</label>
                </div>

                <div class="radio-option">
                    <input type="radio" id="flo" name="platform" value="flo">
                    <label for="flo"><img src="flo.png" alt="플로" class="app-icon" onerror="this.style.display='none'"> 플로</label>
                </div>
            </div>
        </fieldset>

        <div class="form-group" id="inputWrapper">
            </div>

        <button type="button" id="addInputBtn" class="btn-secondary">+ 멜론 입력 칸 추가</button>
        <button type="button" id="generateBtn" class="btn-primary">스밍 주소 생성</button>

        <div class="output-group" id="outputWrapper" aria-live="polite">
        </div>
    </div>
    
    <script src="script.js?v=2"></script>
</body>
</html>
