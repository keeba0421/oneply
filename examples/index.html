<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스밍 주소 생성기 예시</title>
    <link rel="stylesheet" href="../css/styles2.css">
</head>
<body>
    <div class="ambient" aria-hidden="true"></div>

    <main class="container">
        <header class="hero">
            <span class="badge">Examples</span>
            <h1>예시 링크 모음</h1>
            <p>버튼은 모두 교체 가능한 자리입니다. 실제 URL로 나중에 바꿔서 사용하세요.</p>
        </header>

        <section class="panel subpage-panel">
            <div class="subpage-nav">
                <a class="quick-link-btn" href="../index2.html">메인으로</a>
                <a class="quick-link-btn" href="../contact/">문의</a>
            </div>

            <div class="examples-layout">
                <div class="examples-content">
                    <section class="platform-samples">
                        <h2>멜론</h2>
                        <div class="sample-grid">
                            <a class="sample-link" href="https://example.com/melon-1" target="_blank" rel="noopener noreferrer"><img src="../melon.png" alt="멜론" class="sample-icon"> 멜론1</a>
                            <a class="sample-link" href="https://example.com/melon-2" target="_blank" rel="noopener noreferrer"><img src="../melon.png" alt="멜론" class="sample-icon"> 멜론2</a>
                            <a class="sample-link" href="https://example.com/melon-3" target="_blank" rel="noopener noreferrer"><img src="../melon.png" alt="멜론" class="sample-icon"> 멜론3</a>
                            <a class="sample-link" href="https://example.com/melon-4" target="_blank" rel="noopener noreferrer"><img src="../melon.png" alt="멜론" class="sample-icon"> 멜론4</a>
                        </div>
                    </section>

                    <section class="platform-samples">
                        <h2>지니뮤직</h2>
                        <div class="sample-grid">
                            <a class="sample-link" href="https://example.com/genie-android" target="_blank" rel="noopener noreferrer"><img src="../genie.png" alt="지니" class="sample-icon"> 지니 안드로이드</a>
                            <a class="sample-link" href="https://example.com/genie-ios" target="_blank" rel="noopener noreferrer"><img src="../genie.png" alt="지니" class="sample-icon"> 지니 iOS</a>
                        </div>
                    </section>

                    <section class="platform-samples">
                        <h2>플로</h2>
                        <div class="sample-grid">
                            <a class="sample-link" href="https://example.com/flo-1" target="_blank" rel="noopener noreferrer"><img src="../flo.png" alt="플로" class="sample-icon"> 플로1</a>
                            <a class="sample-link" href="https://example.com/flo-2" target="_blank" rel="noopener noreferrer"><img src="../flo.png" alt="플로" class="sample-icon"> 플로2</a>
                            <a class="sample-link" href="https://example.com/flo-3" target="_blank" rel="noopener noreferrer"><img src="../flo.png" alt="플로" class="sample-icon"> 플로3</a>
                            <a class="sample-link" href="https://example.com/flo-4" target="_blank" rel="noopener noreferrer"><img src="../flo.png" alt="플로" class="sample-icon"> 플로4</a>
                        </div>
                    </section>
                </div>

                <figure class="example-figure">
                    <img src="../omg_list.png" alt="예시 목록 이미지" class="example-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <figcaption class="image-fallback">omg_list.png 파일을 루트 폴더에 넣으면 이미지가 보입니다.</figcaption>
                </figure>
            </div>
        </section>
    </main>
</body>
</html>
