<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공유 링크 열기</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='share.css') }}">
</head>
<body>
    <div class="ambient" aria-hidden="true"></div>

    <main class="container">
        <header class="hero">
            <span class="badge">Shared Link</span>
            <h1>공유된 앱 링크</h1>
            <p class="list-title">리스트: {{ list_title }}</p>
            <p>원하는 앱 버튼을 눌러 열어주세요. 코드: {{ code }}</p>
        </header>

        <section class="panel">
            <div class="link-grid">
                {% for item in links %}
                <button
                    type="button"
                    class="open-btn"
                    data-url="{{ item.url }}"
                >
                    {% if item.platform == "melon" %}
                    <img src="{{ request.url_for('assets', path='melon.png') }}" alt="멜론" class="app-icon">
                    {% elif item.platform == "genie" %}
                    <img src="{{ request.url_for('assets', path='genie.png') }}" alt="지니" class="app-icon">
                    {% else %}
                    <img src="{{ request.url_for('assets', path='flo.png') }}" alt="플로" class="app-icon">
                    {% endif %}
                    {{ item.label }}
                </button>
                {% endfor %}
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.open-btn').forEach(button => {
                button.addEventListener('click', () => {
                    const link = button.dataset.url;
                    if (link) {
                        window.location.href = link;
                    }
                });
            });
        });
    </script>
</body>
</html>
